<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ระบบทะเบียนคุม จัดซื้อ-จัดจ้าง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
    <script>
        // ระบบป้องกันหน้าเว็บ: ตรวจสอบว่าล็อกอินมาหรือยัง
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html'; // ถ้ายังไม่ล็อกอิน ให้เตะกลับไปหน้าแรก
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-8 fade-in">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 pb-4 border-b border-slate-200">
            <div class="mb-4 sm:mb-0">
                <h2 class="text-2xl font-bold text-blue-900">ระบบทะเบียนคุม จัดซื้อ-จัดจ้าง</h2>
                <p class="text-slate-500 text-sm mt-1">
                    ยินดีต้อนรับคุณ <span id="displayUser" class="font-semibold text-blue-700"></span> 
                    (<span id="displayRole" class="text-xs"></span>)
                </p>
            </div>
            
            <button onclick="logout()" class="bg-white border border-red-200 hover:bg-red-50 hover:border-red-300 text-red-600 font-medium py-2 px-4 rounded-lg shadow-sm transition-all duration-200 flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                ออกจากระบบ
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 transform hover:-translate-y-1 transition-transform duration-300">
                <div class="text-slate-500 text-sm font-medium mb-1">รายการทั้งหมด</div>
                <div class="text-4xl font-bold text-slate-800">128</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 transform hover:-translate-y-1 transition-transform duration-300">
                <div class="text-slate-500 text-sm font-medium mb-1">รออนุมัติ</div>
                <div class="text-4xl font-bold text-yellow-500">12</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 transform hover:-translate-y-1 transition-transform duration-300">
                <div class="text-slate-500 text-sm font-medium mb-1">ดำเนินการแล้วเสร็จ</div>
                <div class="text-4xl font-bold text-green-500">116</div>
            </div>
        </div>
    </div>

    <script>
        // นำข้อมูลที่เก็บไว้มาแสดงผล
        document.getElementById('displayUser').textContent = sessionStorage.getItem('username');
        document.getElementById('displayRole').textContent = sessionStorage.getItem('userRole');

        // ฟังก์ชันออกจากระบบ
        function logout() {
            sessionStorage.clear(); // ล้างข้อมูล Session
            window.location.href = 'index.html'; // กลับไปหน้า Login
        }
    </script>
</body>
</html>
