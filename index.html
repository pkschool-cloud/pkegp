<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบทะเบียนคุม จัดซื้อ-จัดจ้าง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        
        /* อนิเมชั่นโหลดหน้าเว็บแบบนุ่มนวล */
        .fade-in-up { 
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            opacity: 0; 
            transform: translateY(30px); 
        }
        @keyframes fadeInUp { 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* Custom Scrollbar เผื่อไว้ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNoZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9IiNlMmU4ZjAiLz48L3N2Zz4=')]">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-pulse" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-[420px] relative z-10">
        <div class="bg-white/80 backdrop-blur-xl w-full rounded-[24px] shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)] border border-white p-8 sm:p-10 fade-in-up">
            
            <div class="text-center mb-8">
                <div class="mx-auto w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center mb-5 text-indigo-600 shadow-sm border border-indigo-100 transform transition hover:scale-105 duration-300">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight">ระบบทะเบียนคุม</h2>
                <p class="text-indigo-600/80 font-medium text-sm mt-1">งานจัดซื้อ-จัดจ้าง</p>
            </div>

            <div id="errorMessage" class="hidden bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl mb-6 text-sm flex items-start transition-all duration-300" role="alert">
                <svg class="w-5 h-5 mr-2.5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span id="errorText" class="leading-relaxed">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-slate-600 mb-2" for="username">ชื่อผู้ใช้งาน</label>
                    <input class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all duration-300" 
                           id="username" type="text" placeholder="ระบุชื่อผู้ใช้งานของคุณ" required autocomplete="username">
                </div>
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-slate-600" for="password">รหัสผ่าน</label>
                    </div>
                    <input class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all duration-300" 
                           id="password" type="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button id="loginBtn" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-medium py-3.5 px-4 rounded-xl shadow-lg shadow-slate-900/20 transition-all duration-300 flex items-center justify-center group" type="submit">
                    <span id="btnText" class="tracking-wide">เข้าสู่ระบบ</span>
                    <svg id="loadingSpinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <svg class="w-4 h-4 ml-2 transform group-hover:translate-x-1 transition-transform duration-300" id="arrowIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </form>
        </div>
        
        <div class="mt-8 text-center fade-in-up" style="animation-delay: 0.2s;">
            <p class="text-xs text-slate-400 font-light tracking-wide">© 2569 Developed by Thianrawich P.</p>
        </div>
    </div>

    <script>
        // URL ถูกต้องตามที่คุณตั้งไว้
        const API_URL = "https://script.google.com/macros/s/AKfycbwMW9OyZCzDVt4RzanUz-PoRqZfQDrRra4RzG0RyQMSVeKoyzOKE13BRUD4XqL9RNWNbA/exec";

        async function handleLogin(event) {
            event.preventDefault(); 
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const arrowIcon = document.getElementById('arrowIcon');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // เริ่มสถานะ Loading
            errorMsg.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-90', 'cursor-not-allowed', 'scale-[0.98]');
            btnText.textContent = "กำลังตรวจสอบ...";
            spinner.classList.remove('hidden');
            arrowIcon.classList.add('hidden');

            try {
                // ส่งข้อมูลไปที่ GAS API (ใช้ POST พร้อม header กันเบราว์เซอร์บล็อก)
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // เก็บสถานะว่า Logged in แล้ว
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userRole', result.role);
                    sessionStorage.setItem('username', user);
                    
                    btnText.textContent = "สำเร็จ! กำลังเข้าสู่ระบบ...";
                    loginBtn.classList.replace('bg-slate-900', 'bg-green-600');
                    loginBtn.classList.replace('hover:bg-indigo-600', 'hover:bg-green-600');
                    
                    // หน่วงเวลาเล็กน้อยให้ User เห็นว่าสำเร็จ แล้วค่อยเปลี่ยนหน้า
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);

                } else {
                    showError(result.message || "ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง");
                }
            } catch (error) {
                showError("ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่อีกครั้ง");
            }

            function showError(message) {
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-90', 'cursor-not-allowed', 'scale-[0.98]');
                btnText.textContent = "เข้าสู่ระบบ";
                spinner.classList.add('hidden');
                arrowIcon.classList.remove('hidden');
                errorText.textContent = message;
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
