<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบทะเบียนคุม จัดซื้อ-จัดจ้าง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white max-w-md w-full rounded-xl shadow-lg overflow-hidden border border-gray-200">
        
        <div class="bg-blue-900 p-6 text-center">
            <div class="mx-auto w-16 h-16 bg-white rounded-full flex items-center justify-center mb-3 shadow-md">
                <svg class="w-10 h-10 text-blue-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold text-white tracking-wide">ระบบทะเบียนคุม จัดซื้อ-จัดจ้าง</h2>
            <p class="text-blue-200 text-sm mt-1">กรุณาเข้าสู่ระบบเพื่อใช้งาน</p>
        </div>

        <div class="p-8">
            <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm text-center" role="alert">
                <span id="errorText" class="block sm:inline">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block text-gray-700 text-sm font-semibold mb-2" for="username">
                        ชื่อผู้ใช้งาน (Username)
                    </label>
                    <input class="shadow-sm border border-gray-300 rounded w-full py-2.5 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                           id="username" type="text" placeholder="ระบุชื่อผู้ใช้งาน" required autocomplete="username">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">
                        รหัสผ่าน (Password)
                    </label>
                    <input class="shadow-sm border border-gray-300 rounded w-full py-2.5 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" 
                           id="password" type="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button id="loginBtn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-2.5 px-4 rounded transition duration-200 flex items-center justify-center" type="submit">
                    <span id="btnText">เข้าสู่ระบบ</span>
                    <svg id="loadingSpinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>
        <div class="bg-gray-50 py-3 text-center border-t border-gray-200">
            <p class="text-xs text-gray-500">© 2569 สงวนลิขสิทธิ์</p>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault(); 
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // เริ่มสถานะ Loading
            errorMsg.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.textContent = "กำลังตรวจสอบ...";
            spinner.classList.remove('hidden');

            // ส่งไปตรวจสอบหลังบ้าน
            google.script.run
                .withSuccessHandler(function(response) {
                    if(response.status === 'success') {
                        // เก็บ Role ไว้ใช้งานในหน้า Dashboard ได้ (ถ้าต้องการ)
                        sessionStorage.setItem('userRole', response.role);
                        
                        btnText.textContent = "กำลังโหลดระบบ...";
                        
                        // สั่งให้ดึงหน้า dashboard.html มาแสดงแทนที่
                        google.script.run
                            .withSuccessHandler(function(htmlString) {
                                document.open();
                                document.write(htmlString);
                                document.close();
                            })
                            .getDashboardPage();

                    } else {
                        // กรณีรหัสผิด หรือหา Sheet ไม่เจอ
                        resetButton();
                        errorText.textContent = response.message || "เกิดข้อผิดพลาด";
                        errorMsg.classList.remove('hidden');
                    }
                })
                .withFailureHandler(function(error) {
                    resetButton();
                    errorText.textContent = "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้";
                    errorMsg.classList.remove('hidden');
                })
                .verifyLogin(user, pass);

            function resetButton() {
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.textContent = "เข้าสู่ระบบ";
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
