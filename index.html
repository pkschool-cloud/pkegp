<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบทะเบียนคุม จัดซื้อ-จัดจ้าง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        input { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="bg-white w-full rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden border border-slate-100 fade-in-up">
            
            <div class="bg-gradient-to-r from-blue-900 to-blue-800 p-8 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9IiNmZmYiLz48L3N2Zz4=')]"></div>
                <div class="relative z-10 mx-auto w-16 h-16 bg-white rounded-2xl flex items-center justify-center mb-4 shadow-lg transform rotate-3 hover:rotate-0 transition-transform duration-300">
                    <svg class="w-8 h-8 text-blue-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path>
                    </svg>
                </div>
                <h2 class="relative z-10 text-xl font-bold text-white tracking-wide">ระบบทะเบียนคุม จัดซื้อ-จัดจ้าง</h2>
                <p class="relative z-10 text-blue-100 text-sm mt-1.5 font-light">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
            </div>

            <div class="p-8">
                <div id="errorMessage" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-md mb-6 text-sm flex items-center shadow-sm transition-all duration-300" role="alert">
                    <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="errorText">ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง</span>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-5">
                        <label class="block text-slate-700 text-sm font-semibold mb-2" for="username">ชื่อผู้ใช้งาน</label>
                        <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-slate-700 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" 
                               id="username" type="text" placeholder="ระบุชื่อผู้ใช้งาน" required autocomplete="username">
                    </div>
                    <div class="mb-8">
                        <label class="block text-slate-700 text-sm font-semibold mb-2" for="password">รหัสผ่าน</label>
                        <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-slate-700 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500" 
                               id="password" type="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    
                    <button id="loginBtn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-300 flex items-center justify-center transform active:scale-[0.98]" type="submit">
                        <span id="btnText">เข้าสู่ระบบ</span>
                        <svg id="loadingSpinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </form>
            </div>
            <div class="bg-slate-50 py-4 text-center border-t border-slate-100">
                <p class="text-xs text-slate-400 font-light">© 2569 สงวนลิขสิทธิ์</p>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ เอา URL Web App จาก Google Apps Script มาใส่ตรงนี้
        const API_URL = "https://script.google.com/macros/s/AKfycbx65kx-ftqSyYIcbiR7t2pC3nK-MYFkJfe-rjjnK27i__IURKsFT14c_yYrYubm0_MCFw/exec";

        async function handleLogin(event) {
            event.preventDefault(); 
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            if(API_URL === "https://script.google.com/macros/s/AKfycbx65kx-ftqSyYIcbiR7t2pC3nK-MYFkJfe-rjjnK27i__IURKsFT14c_yYrYubm0_MCFw/exec") {
                showError("กรุณาใส่ API_URL ในโค้ดก่อนใช้งาน");
                return;
            }

            // เริ่มสถานะ Loading
            errorMsg.classList.add('hidden');
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.textContent = "กำลังตรวจสอบ...";
            spinner.classList.remove('hidden');

            try {
                // ส่งข้อมูลไปที่ GAS API (ใช้ POST แบบไม่ระบุ Content-Type เพื่อเลี่ยง CORS Preflight Error)
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ username: user, password: pass })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // เก็บสถานะว่า Logged in แล้ว พร้อม Role เผื่อเอาไปใช้ในหน้า Dashboard
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('userRole', result.role);
                    sessionStorage.setItem('username', user);
                    
                    btnText.textContent = "เข้าสู่ระบบสำเร็จ กำลังพาไปหน้าหลัก...";
                    
                    // เปลี่ยนหน้าเว็บไปยังไฟล์ dashboard.html ที่อยู่บน GitHub เดียวกัน
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);

                } else {
                    showError(result.message || "ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง");
                }
            } catch (error) {
                showError("ไม่สามารถเชื่อมต่อฐานข้อมูลได้: " + error.message);
            }

            function showError(message) {
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.textContent = "เข้าสู่ระบบ";
                spinner.classList.add('hidden');
                errorText.textContent = message;
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
