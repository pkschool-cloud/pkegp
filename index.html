<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="loginSection" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 border border-slate-100">
            <div class="text-center mb-8">
                <div class="text-4xl mb-4">🔐</div>
                <h2 class="text-2xl font-bold text-slate-800">เข้าสู่ระบบ</h2>
                <p class="text-slate-400 text-sm">ทะเบียนคุม จัดซื้อ-จัดจ้าง ๒๕๖๙</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Username" class="w-full p-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <input type="password" id="passInput" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <button onclick="login()" id="loginBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">ยืนยันตัวตน</button>
            </div>
            <p class="text-center mt-6 text-xs text-slate-400 font-light italic">หากติดปัญหากรุณาติดต่อผู้ดูแลระบบ</p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <nav class="bg-indigo-950 text-white p-6 shadow-xl sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">📋</span>
                    <span class="font-bold tracking-tight">DOCUMENT CONTROL 2569</span>
                </div>
                <div class="flex items-center space-x-6 border-l border-indigo-800 pl-6">
                    <div class="text-right">
                        <p id="uNameDisp" class="text-sm font-bold"></p>
                        <p id="uRoleDisp" class="text-[10px] text-indigo-400 tracking-widest uppercase"></p>
                    </div>
                    <button onclick="logout()" class="bg-rose-500 hover:bg-rose-600 px-4 py-2 rounded-xl text-xs font-bold transition-colors">ออกจากระบบ</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-4 border-emerald-500">
                    <h3 class="text-emerald-700 font-bold text-lg mb-4 flex items-center">📦 หมวดจัดซื้อ (ซ.)</h3>
                    <input id="buyInput" type="text" placeholder="ระบุชื่อโครงการจัดซื้อ..." class="w-full border-slate-100 border-2 p-4 rounded-2xl mb-4 outline-none focus:border-emerald-500 transition-colors">
                    <button onclick="createProject('ซ')" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:shadow-lg transition-all">ออกเลขทะเบียน</button>
                </div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border-b-4 border-blue-500">
                    <h3 class="text-blue-700 font-bold text-lg mb-4 flex items-center">⚙️ หมวดจัดจ้าง (จ.)</h3>
                    <input id="hireInput" type="text" placeholder="ระบุชื่อโครงการจัดจ้าง..." class="w-full border-slate-100 border-2 p-4 rounded-2xl mb-4 outline-none focus:border-blue-500 transition-colors">
                    <button onclick="createProject('จ')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:shadow-lg transition-all">ออกเลขทะเบียน</button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-6 text-slate-500 text-xs font-bold uppercase tracking-widest">เลขทะเบียน</th>
                            <th class="p-6 text-slate-500 text-xs font-bold uppercase tracking-widest">ชื่อโครงการ/รายละเอียด</th>
                            <th class="p-6 text-slate-500 text-xs font-bold uppercase tracking-widest">วันที่รับเข้า</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <footer class="text-center py-10 opacity-30 text-[10px] space-y-1 uppercase tracking-tighter">
        <p>develop by Thianrawich Pichayanandhakul</p>
        <p>2026 copyright © all rights reserved</p>
    </footer>

    <script>
        // ใส่ลิงก์ที่คุณได้จากการ Deploy (Web App URL) ตรงนี้ครับ
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbw2DLVqc3Alvx8Rda_DkSwV-NK1DtSqFbmDea-9c96sAPOLlG15uerS1uVBhoxWOJdndw/exec';
        
        let currentUser = {};

        async function api(payload) {
            const res = await fetch(scriptUrl, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            return res.json();
        }

        async function login() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const btn = document.getElementById('loginBtn');
            
            if(!user || !pass) return;
            btn.disabled = true; btn.innerText = 'กำลังตรวจสอบ...';

            const res = await api({ action: 'login', user, pass });
            if(res.status === 'success') {
                currentUser = res;
                document.getElementById('uNameDisp').innerText = res.name;
                document.getElementById('uRoleDisp').innerText = res.role === 'admin' ? 'แอดมินผู้ดูแลระบบ' : 'ผู้ใช้งานทั่วไป';
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                refreshTable();
            } else {
                alert('ข้อมูลไม่ถูกต้อง');
                btn.disabled = false; btn.innerText = 'ยืนยันตัวตน';
            }
        }

        async function createProject(type) {
            const input = document.getElementById(type === 'ซ' ? 'buyInput' : 'hireInput');
            if(!input.value) return;

            const allData = await api({ action: 'fetch' });
            const count = allData.filter(r => r[1] === type).length + 1;
            const docNum = `${type}.${String(count).padStart(3, '0')}/2569`;
            
            const payload = { id: Date.now(), type, docNum, name: input.value };
            await api({ action: 'save', data: payload });
            
            input.value = '';
            refreshTable();
        }

        async function refreshTable() {
            const data = await api({ action: 'fetch' });
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = data.reverse().map(r => {
                const id = r[0], type = r[1], docNum = r[2], name = r[3], date = r[4];
                let dateDisplay = '';

                if (currentUser.role === 'admin') {
                    dateDisplay = `<input type="date" value="${date}" onchange="updateDate('${id}', this.value)" class="p-2 border rounded-xl bg-indigo-50 text-indigo-700 text-sm">`;
                } else {
                    dateDisplay = date ? `<span class="bg-slate-100 px-4 py-2 rounded-full text-xs text-slate-400 font-bold">🔒 ${date}</span>` 
                                     : `<input type="date" onchange="updateDate('${id}', this.value)" class="p-2 border border-orange-200 rounded-xl text-sm">`;
                }

                return `<tr>
                    <td class="p-6 font-bold text-indigo-900 font-mono text-lg">${docNum}</td>
                    <td class="p-6 text-slate-600 text-sm">${name}</td>
                    <td class="p-6">${dateDisplay}</td>
                </tr>`;
            }).join('');
        }

        async function updateDate(id, newDate) {
            await api({ action: 'updateDate', id, newDate });
            refreshTable();
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
