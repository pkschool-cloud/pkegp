<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบทะเบียนคุม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
            border-color: #764ba2;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="login-card bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
        
        <div class="p-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-50 rounded-2xl mb-4">
                    <span class="text-4xl">🔐</span>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 tracking-tight">ยินดีต้อนรับ</h2>
                <p class="text-gray-400 text-sm mt-1">เข้าสู่ระบบทะเบียนคุม จัดซื้อ-จัดจ้าง</p>
            </div>

            <div id="errorBox" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-r-xl">
                <p id="errorText" class="text-sm text-red-700"></p>
            </div>

            <form id="loginForm" onsubmit="executeLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Username</label>
                    <input type="text" id="username" required
                           class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none transition-all input-focus text-gray-700" 
                           placeholder="ชื่อผู้ใช้งาน">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Password</label>
                    <input type="password" id="password" required
                           class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none transition-all input-focus text-gray-700" 
                           placeholder="••••••••">
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-95 flex items-center justify-center space-x-2">
                    <span id="btnText">เข้าสู่ระบบ</span>
                    <div id="loader" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-400">
                    หากติดปัญหากรุณาติดต่อผู้ดูแลระบบ
                </p>
            </div>
        </div>
        
        <div class="bg-gray-50 px-10 py-4 text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Internal Use Only © 2026</p>
        </div>
    </div>

    <script>
        function executeLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');

            // เริ่มการโหลด
            btn.disabled = true;
            btnText.textContent = "กำลังยืนยันตัวตน...";
            loader.classList.remove('hidden');
            errorBox.classList.add('hidden');

            google.script.run
                .withSuccessHandler(function(response) {
                    if (response.status === 'success') {
                        // เก็บข้อมูลไว้ใน Session เพื่อใช้ในหน้า Dashboard
                        sessionStorage.setItem('uName', response.name || user);
                        sessionStorage.setItem('uRole', response.role);
                        
                        btnText.textContent = "สำเร็จ! กำลังเข้าสู่ระบบ...";
                        
                        // ดึงหน้า Dashboard มาแสดง
                        google.script.run
                            .withSuccessHandler(function(html) {
                                document.open();
                                document.write(html);
                                document.close();
                            })
                            .getDashboardPage();
                    } else {
                        // กรณีรหัสผิด
                        btn.disabled = false;
                        btnText.textContent = "เข้าสู่ระบบ";
                        loader.classList.add('hidden');
                        errorText.textContent = response.message;
                        errorBox.classList.remove('hidden');
                    }
                })
                .withFailureHandler(function(err) {
                    btn.disabled = false;
                    btnText.textContent = "เข้าสู่ระบบ";
                    loader.classList.add('hidden');
                    errorText.textContent = "ระบบขัดข้อง กรุณาลองใหม่ภายหลัง";
                    errorBox.classList.remove('hidden');
                })
                .verifyLogin(user, pass);
        }
    </script>
</body>
</html>
